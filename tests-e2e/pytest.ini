[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    --html=reports/report.html
    --self-contained-html
    --browser=chromium
    --output=screenshots
markers =
    smoke: szybkie testy podstawowe (zawsze first)
    auth: wymagaja zalogowania (env: KSEF_TEST_USER, KSEF_TEST_PASS)
    public: testy stron publicznych
    security: testy bezpieczenstwa (XSS, headers, CSRF)
    a11y: accessibility (axe-core)
    responsive: testy responsywnosci
    explorer: AI-driven crawl
    slow: dluzsze testy (skip w smoke run)
    destructive: zmieniaja stan (rate limit, password change)
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %H:%M:%S
