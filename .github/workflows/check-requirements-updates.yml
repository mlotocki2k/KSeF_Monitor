name: "Check Python requirements updates"

on:
  schedule:
    - cron: "5 22 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: check-requirements
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        branch: [test, main]
    steps:
      - name: Checkout ${{ matrix.branch }} branch
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.branch }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev pkg-config

      - name: Install requirements
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check outdated packages (direct dependencies only)
        id: outdated
        shell: bash
        run: |
          set -euo pipefail
          pip list --outdated --format=json > all_outdated.json
          python - << 'PY'
          import json, re

          # Parse direct dependency names from requirements.txt
          direct = set()
          with open("requirements.txt", encoding="utf-8") as f:
              for line in f:
                  line = line.strip()
                  if not line or line.startswith("#"):
                      continue
                  # Extract package name (before any version specifier)
                  match = re.match(r'^([A-Za-z0-9_-]+(?:\[[^\]]+\])?)', line)
                  if match:
                      # Strip extras like [standard] for comparison
                      name = re.sub(r'\[.*\]', '', match.group(1)).lower()
                      direct.add(name)

          # Filter outdated to direct dependencies only
          all_outdated = json.load(open("all_outdated.json", encoding="utf-8"))
          filtered = [p for p in all_outdated if p["name"].lower() in direct]

          with open("outdated.json", "w", encoding="utf-8") as f:
              json.dump(filtered, f)
          print(len(filtered))
          PY

          COUNT=$(python -c "import json; print(len(json.load(open('outdated.json'))))")
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Build issue body
        if: steps.outdated.outputs.count != '0'
        shell: bash
        run: |
          set -euo pipefail
          python - << 'PY'
          import json
          data = json.load(open("outdated.json", "r", encoding="utf-8"))

          lines = []
          lines.append("Wykryto dostępne aktualizacje paczek z `requirements.txt` na branchu `${{ matrix.branch }}`.")
          lines.append("")
          lines.append("| Package | Current | Latest |")
          lines.append("|---|---:|---:|")
          for p in data:
              lines.append(f"| {p['name']} | {p['version']} | {p['latest_version']} |")
          lines.append("")
          lines.append("Sugestia:")
          lines.append("- przejrzyj changelogi i zaktualizuj `requirements.txt` (lub użyj narzędzia typu pip-tools/poetry).")
          open("issue_body.md", "w", encoding="utf-8").write("\\n".join(lines))
          PY

      - name: Create or update issue if updates exist
        if: steps.outdated.outputs.count != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const title = "Python dependency updates available (branch: ${{ matrix.branch }})";
            const fs = require("fs");
            const body = fs.readFileSync("issue_body.md", "utf8");

            // Search for existing issue (open OR closed)
            const { data: issues } = await github.rest.search.issuesAndPullRequests({
              q: `repo:${context.repo.owner}/${context.repo.repo} is:issue in:title "${title}"`
            });

            // Parse package names from issue body table rows: "| name | current | latest |"
            const parsePkgs = (text) => {
              const s = new Set();
              for (const line of (text || "").split("\n")) {
                const m = line.match(/^\|\s*([A-Za-z0-9_.-]+)\s*\|\s*[0-9]/);
                if (m) s.add(m[1].toLowerCase());
              }
              return s;
            };

            if (issues.items.length > 0) {
              // Pick the most recent issue
              const issue_number = issues.items[0].number;
              const issue_state = issues.items[0].state;
              const labels = (issues.items[0].labels || []).map(l => typeof l === "string" ? l : l.name);
              const isWontfix = labels.includes("wontfix");

              // Check if body is identical to current issue body — skip if nothing changed
              const currentBody = issues.items[0].body || "";
              if (issue_state === "open" && currentBody.trim() === body.trim()) {
                console.log(`Issue #${issue_number} already open with identical content — skipping.`);
                return;
              }

              // Closed + wontfix → respect intentional pin. Only escalate if NEW packages
              // appeared that weren't covered by the wontfix snapshot.
              if (issue_state === "closed" && isWontfix) {
                const covered = parsePkgs(currentBody);
                const nowOutdated = parsePkgs(body);
                const novel = [...nowOutdated].filter(p => !covered.has(p));
                if (novel.length === 0) {
                  console.log(`Issue #${issue_number} closed as wontfix; all current outdated pkgs (${[...nowOutdated].join(", ")}) already covered — skipping.`);
                  return;
                }
                console.log(`Issue #${issue_number} wontfix but new pkgs appeared (${novel.join(", ")}) — creating new issue.`);
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title,
                  body,
                  labels: ['requirements']
                });
                return;
              }

              // Reopen if closed (and not wontfix)
              if (issue_state === "closed") {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number,
                  state: "open",
                  body
                });
              }

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body
              });
              // Add 'requirements' label to trigger update-requirements workflow
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                labels: ['requirements']
              });
            } else {
              const newIssue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['requirements']
              });
            }

      - name: Summary
        run: |
          echo "Outdated packages count: ${{ steps.outdated.outputs.count }}" >> $GITHUB_STEP_SUMMARY
